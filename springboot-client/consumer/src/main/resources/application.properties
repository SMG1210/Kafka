spring.application.name=producer-consumer
server.port=8082

# Kafka Consumer Configuration
spring.kafka.bootstrap-servers=localhost:443
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer


# Custom Topic
app.kafka.topic=prod.consum.clients-test
spring.kafka.consumer.group-id=clients-consumer-test-15
spring.kafka.consumer.auto-offset-reset=earliest

#security
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="Test" password="Test_Pass";


